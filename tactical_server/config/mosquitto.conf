# =================================================================
# TACTICAL DRONE FLEET - MOSQUITTO BROKER CONFIGURATION
# =================================================================

# 1. Standard MQTT Port (Used by the Android Drone Client)
listener 1883 0.0.0.0
protocol mqtt

# 2. WebSockets Port (Used by the Web Browser Command Center UI)
listener 9001 0.0.0.0
protocol websockets

# 3. Security & Authentication
# For rapid testing, we allow anonymous (password-less) connections.
# WARNING: In a production tactical environment, change this to 'false'
# and configure a password file using the 'password_file' directive!
allow_anonymous true

# 4. Persistence
# Saves telemetry/messages in memory to disk so they aren't lost on restart.
persistence true
persistence_location /mosquitto/data/

# 5. Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
