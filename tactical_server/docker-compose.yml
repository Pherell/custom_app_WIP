version: '3.8'

services:
  # 1. MQTT Broker for Messaging
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: tactical_mqtt_broker
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # 2. Offline Tactical Map Server (Air-Gapped environments)
  # Serves the XYZ map tiles to the drone and the Web UI without internet.
  map-server:
    image: maptiler/tileserver-gl:latest
    container_name: tactical_map_server
    restart: unless-stopped
    ports:
      - "${MAP_SERVER_PORT:-8080}:80"
    volumes:
      - ./data/maptiles:/data
    # Note: You will need to drop a .mbtiles file into the ./data/maptiles folder!

  # 3. Command Center Web UI Frontend (Deployed)
  # This serves the actual React/Next.js dashboard to your browser via Nginx.
  c2-frontend:
    build: ./frontend
    container_name: tactical_c2_ui
    restart: always
    ports:
      - "${WEB_UI_PORT:-80}:80"

  # 4. WebRTC Signaling Server & Telemetry Persistence Backend
  backend-api:
    build: ./backend
    container_name: tactical_backend_api
    restart: always
    ports:
      - "${BACKEND_PORT:-9005}:8000"
    environment:
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - POSTGRES_USER=tactical
      - POSTGRES_PASSWORD=tactical123
      - POSTGRES_DB=tactical_c2
      - POSTGRES_HOST=db
    depends_on:
      - mqtt-broker
      - db

  # 5. Tactical Time-Series Database
  db:
    image: postgres:15-alpine
    container_name: tactical_postgres_db
    restart: always
    environment:
      - POSTGRES_USER=tactical
      - POSTGRES_PASSWORD=tactical123
      - POSTGRES_DB=tactical_c2
    volumes:
      - pgdata:/var/lib/postgresql/data



volumes:
  pgdata:
